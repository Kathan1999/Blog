{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Blog Generator</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <!-- Navbar -->
    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">My Blog</a>
        </div>
    </nav>

    <!-- Main Container -->
    <div class="container mt-5">

        <!-- Page Title -->
        <h2 class="text-center mb-4">🤖 AI Blog Generator</h2>

        <!-- Form -->
        <div class="card p-4 shadow-sm">
            <form method="GET">

                <div class="mb-3">
                    <label class="form-label">Enter Blog Topic</label>
                    <input 
                        type="text" 
                        name="topic" 
                        class="form-control" 
                        placeholder="e.g. Best earbuds under 2000"
                        value="{{ topic }}"
                        required
                    >
                </div>

                <button type="submit" class="btn btn-primary w-100">
                    Generate Blog
                </button>

            </form>
        </div>

        <!-- Result Section -->
        {% if content %}
        <div class="card mt-4 p-4 shadow-sm">

            <h4 class="mb-3">📝 Generated Content</h4>

            <div style="white-space: pre-wrap;">
                {{ content }}
            </div>

        </div>
        {% endif %}

    </div>

</body>
</html>
