{% load static %}
<html>
    <head>
        <title>My Blog</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    </head>
    <body>
        <div class="container mt-5">
            <h1>My Blog</h1>

            <div class="row">
                {% for post in posts %}
                <div class="col-md-4">
                    <div class="card mb-4">
                        {% if post.featured_image %}
                        <img src="{{post.featured_image.url}}" class="card-img-top">
                        {% endif %}

                        <div class="card-body">
                            <h5>{{ post.title }}</h5>
                            <p>{{ post.excerpt }}</p>
                        </div>
                    </div>
                </div>
                {% endfor %}
            </div>
        </div>
