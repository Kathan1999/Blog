{% load static %}
<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="widht=device-width, initial-scale=1.0">
        <title>My Blog</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    </head>
    <body>
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
            <div class="container">
                <a class="text-center mb-4" href="/">My Blog</a>
            </div>
        </nav>

        <div class="container">
            <h2 class="text-center mb-4">Latest Posts</h2>
        </div>

        <div class="container">
            <div class="row">
                {% for post in posts %}
                <div class="col md 4 mb-4">
                    <div class="card h-100 shadow-sm">
                        {% if post.featured_image %}
                        <img src="{{ post.featured_image.url }}" class="card-img-top" alt="{{ post.title }}">
                        {% else %}
                        <img src="{% static 'default.jpg' %}" class="card-img-top" alt="No Image">
                        {% endif %}

                        <div class="card-body">
                            <h5 class="card-title">{{ post.title|truncatechars:60 }}</h5>
                            <p class="card-text text-muted">{{ post.excerpt|truncatechars:120 }}</p>
                            <a href="{% url 'post_detail' slug=post.slug %}" class="btn btn-primary">
                                Read More
                            </a>
                        </div>
                    </div>
                </div>
                {% empty %}
                <p>No Posts Found</p>
                {% endfor %}
            </div>
        </div>

        <!-- Bootstrap JS -->
        <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js" integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y" crossorigin="anonymous"></script>

    </body>
</html>
