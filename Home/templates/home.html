{% load static %}
<html>
<head>
    <title>My Blog</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <h1 class="text-center mb-5">🔥 My Blog</h1>

    <div class="row">
        {% for post in posts %}
        <div class="col-md-4">
            <div class="card shadow-sm mb-4">

                {% if post.featured_image %}
                <img src="{{ post.featured_image.url }}" class="card-img-top" style="height:200px; object-fit:cover;">
                {% endif %}

                <div class="card-body">
                    <h5 class="card-title">
                        <a href="{% url 'post_detail' post.slug %}" class="text-dark text-decoration-none">
                            {{ post.title }}
                        </a>
                    </h5>

                    <p class="card-text text-muted">
                        {{ post.excerpt }}
                    </p>

                    <a href="{% url 'post_detail' post.slug %}" class="btn btn-primary">
                        Read More →
                    </a>
                </div>

            </div>
        </div>
        {% endfor %}
    </div>

</div>

</body>
</html>
